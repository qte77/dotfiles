# WakaTime CLI config
# Full reference: https://github.com/wakatime/wakatime-cli/blob/develop/USAGE.md
# API key resolved from WAKATIME_API_KEY env var (Codespaces secret)

[settings]
api_url = https://api.wakatime.com/api/v1
heartbeat_rate_limit_seconds = 120
offline = true
status_bar_enabled = true
status_bar_coding_activity = true
include_only_with_project_file = false
exclude_unknown_project = false
